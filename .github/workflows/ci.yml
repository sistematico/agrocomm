name: CI

on:
  push:
    paths:
      - "apps/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: |
          cd apps/api && bun install
          cd apps/site && bun install
          cd apps/site && bun run build